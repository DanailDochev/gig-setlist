<!doctype html>
<html lang="bg">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Дани Дочев · Акустично</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --sans: 'Inter', -apple-system, system-ui, sans-serif;
    --display: 'Fraunces', Georgia, serif;
    --serif-text: 'EB Garamond', Georgia, serif;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #08070a; color: #eae3d2; font-family: var(--sans); }
  body { min-height: 100vh; }

  @keyframes barPulse { from { height: 2px; } to { height: 14px; } }
  @keyframes photoDrift {
    0% { transform: scale(1.28) translate(0, 0); }
    100% { transform: scale(1.34) translate(-8px, -10px); }
  }
  @keyframes starPop {
    0% { opacity: 0; transform: translate(0, 0) rotate(0deg) scale(0.3); }
    30% { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--tx, 20px), var(--ty, -40px)) rotate(360deg) scale(1); }
  }
  @keyframes liveDot {
    from { opacity: 0.3; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1.2); }
  }
  @keyframes shardFade {
    0% { opacity: 1; stroke-width: 3; }
    100% { opacity: 0; stroke-width: 0.5; }
  }
  @keyframes glowDrift1 {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(40px, 30px) scale(1.15); }
  }
  @keyframes glowDrift2 {
    0% { transform: translate(0, 0) scale(1.1); }
    100% { transform: translate(-30px, -40px) scale(0.9); }
  }
  @keyframes glowDrift3 {
    0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
    100% { transform: translate(-20px, 20px) scale(1.2); opacity: 1; }
  }
  @keyframes smokeCurl {
    0%, 100% { transform: scaleX(1) translateY(0); opacity: 0.55; }
    33% { transform: scaleX(1.3) translateY(-3px); opacity: 0.3; }
    66% { transform: scaleX(0.8) translateY(-6px); opacity: 0.45; }
  }

  .app-shell {
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 28px 16px 80px; gap: 22px;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(184,153,104,0.06), transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(156,59,59,0.05), transparent 50%),
      #08070a;
  }
  .viewswitch {
    display: flex; gap: 4px; padding: 3px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(234,227,210,0.1);
    border-radius: 999px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase;
  }
  .viewswitch button {
    padding: 8px 14px; background: transparent; border: none;
    color: #7a7365; font-family: inherit; font-size: inherit; letter-spacing: inherit;
    cursor: pointer; border-radius: 999px;
  }
  .viewswitch button.active { background: #eae3d2; color: #08070a; font-weight: 500; }

  .caption {
    font-family: var(--mono); font-size: 9px; letter-spacing: 3px;
    color: #55504a; text-align: center; text-transform: uppercase;
    max-width: 420px; line-height: 1.8;
  }

  .tweaks {
    position: fixed; right: 16px; bottom: 16px;
    background: rgba(13, 12, 10, 0.94);
    border: 1px solid rgba(234,227,210,0.16);
    border-radius: 2px;
    padding: 16px; width: 240px;
    font-family: var(--mono); font-size: 11px; color: #eae3d2;
    z-index: 9999;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .tweaks h4 {
    margin: 0 0 14px; font-size: 9px; letter-spacing: 4px;
    color: #b89968; text-transform: uppercase; font-weight: 500;
  }
  .tweaks label {
    display: block; margin: 12px 0 5px; color: #7a7365;
    font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
  }
  .tweaks .row { display: flex; gap: 3px; }
  .tweaks .row button {
    flex: 1; padding: 7px 4px; background: transparent;
    border: 1px solid rgba(234,227,210,0.14);
    color: #eae3d2; font-family: inherit; font-size: 10px;
    cursor: pointer; letter-spacing: 1.5px;
  }
  .tweaks .row button.on { background: #b89968; color: #08070a; border-color: #b89968; }
  .tweaks input[type=range] { width: 100%; accent-color: #b89968; }

  .device-shell { position: relative; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="songs.js"></script>
<script type="text/babel" src="wireframes.jsx"></script>
<script type="text/babel" src="filmic.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAKS = /*EDITMODE-BEGIN*/{
  "themeMode": "dark",
  "fontSize": 16,
  "aesthetic": "ink",
  "view": "hifi"
}/*EDITMODE-END*/;

function PhoneFrame({ children }) {
  return (
    <div className="device-shell">
      <div style={{
        width: 390, height: 810,
        borderRadius: 52, overflow: 'hidden',
        position: 'relative', background: '#000',
        boxShadow: '0 30px 90px rgba(0,0,0,0.7), 0 0 0 10px #141110, 0 0 0 11px rgba(234,227,210,0.08)',
      }}>
        <div style={{
          position: 'absolute', top: 10, left: '50%', transform: 'translateX(-50%)',
          width: 118, height: 32, borderRadius: 22, background: '#000', zIndex: 100,
          pointerEvents: 'none'
        }} />
        <div style={{
          position: 'absolute', bottom: 7, left: '50%', transform: 'translateX(-50%)',
          width: 134, height: 4, borderRadius: 100, background: 'rgba(255,255,255,0.45)',
          zIndex: 100, pointerEvents: 'none'
        }} />
        <div style={{ position: 'absolute', inset: 0 }}>{children}</div>
      </div>
    </div>
  );
}

function TweaksPanel({ tweaks, setTweaks, edit }) {
  if (!edit) return null;
  const set = (k, v) => {
    setTweaks(t => ({ ...t, [k]: v }));
    if (window.parent) window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };
  return (
    <div className="tweaks">
      <h4>Tweaks</h4>

      <label>Светло / Тъмно</label>
      <div className="row">
        <button className={tweaks.themeMode === 'dark' ? 'on' : ''} onClick={() => set('themeMode', 'dark')}>Тъмно</button>
        <button className={tweaks.themeMode === 'light' ? 'on' : ''} onClick={() => set('themeMode', 'light')}>Светло</button>
      </div>

      <label>Естетика</label>
      <div className="row">
        <button className={tweaks.aesthetic === 'editorial' ? 'on' : ''} onClick={() => set('aesthetic', 'editorial')}>Bone</button>
        <button className={tweaks.aesthetic === 'ink' ? 'on' : ''} onClick={() => set('aesthetic', 'ink')}>Ink</button>
        <button className={tweaks.aesthetic === 'mono' ? 'on' : ''} onClick={() => set('aesthetic', 'mono')}>Mono</button>
      </div>

      <label>Размер на текста · {tweaks.fontSize}px</label>
      <input type="range" min="15" max="28" value={tweaks.fontSize}
        onChange={(e) => set('fontSize', parseInt(e.target.value))} />
    </div>
  );
}

function Root() {
  const [tweaks, setTweaks] = useState(TWEAKS);
  const [view, setView] = useState(TWEAKS.view || 'hifi');
  const [edit, setEdit] = useState(false);

  useEffect(() => {
    const handler = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setEdit(true);
      if (d.type === '__deactivate_edit_mode') setEdit(false);
    };
    window.addEventListener('message', handler);
    if (window.parent) window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  useEffect(() => {
    const saved = localStorage.getItem('setlist-view');
    if (saved) setView(saved);
  }, []);
  useEffect(() => { localStorage.setItem('setlist-view', view); }, [view]);

  return (
    <div className="app-shell">
      <div className="viewswitch">
        <button className={view === 'hifi' ? 'active' : ''} onClick={() => setView('hifi')}>Прототип</button>
        <button className={view === 'wires' ? 'active' : ''} onClick={() => setView('wires')}>Скици</button>
      </div>

      {view === 'hifi' && (
        <>
          <div className="caption">
            {tweaks.aesthetic} — {tweaks.themeMode === 'dark' ? 'тъмно' : 'светло'} — сканирай и следвай програмата
          </div>
          <PhoneFrame>
            <window.FilmicApp
              themeMode={tweaks.themeMode}
              fontSize={tweaks.fontSize}
              aesthetic={tweaks.aesthetic}
            />
          </PhoneFrame>
          <div className="caption">
            кориц<span style={{opacity:0.5}}>а</span> · програм<span style={{opacity:0.5}}>а</span> с паузи и финална изненада ·<br/>
            5 песни отворими за "пей с нас" (маркирани ♪)
          </div>
        </>
      )}

      {view === 'wires' && <window.WireframeGrid />}

      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} edit={edit} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>

</body>
</html>
